<body>
    <script type="text/javascript">
        function OKclick(s, e) {
            var dkj = document.getElementById('DaiKuanJin').value;
            var ys = document.getElementById('NianShu').value;
            var yl = document.getElementById('NianLv').value;
            var sf = document.getElementById('ShangFu').value;

            var exp = /^\d+(\.\d+)?$/;
            if (null == dkj.match(exp) || null == ys.match(exp) ||
                null == yl.match(exp) || null == sf.match(exp)) {
                alert("请确认输入框中输入的都是数字!!!");
                return;
            }
            ys = ys * 12;
            yl = yl / 12 / 100;
            sf = sf / 100;
            yl = yl * sf;

            var tabHK = document.getElementById("HuanKuan");
            var debx = dkj * 10000 * yl * Math.pow(1 + yl, ys) / (Math.pow(1 + yl, ys) - 1);
            tabHK.rows[1].cells[2].innerHTML = debx.toFixed(2);
            tabHK.rows[2].cells[2].innerHTML = (debx * ys - dkj * 10000).toFixed(2);
            tabHK.rows[3].cells[2].innerHTML = (debx * ys).toFixed(2);
            tabHK.rows[4].cells[2].innerHTML = (dkj * 10000 / ys + dkj * 10000 * yl).toFixed(2);
            tabHK.rows[5].cells[2].innerHTML = ((dkj * 10000 * ys - dkj * 10000 / ys * (ys * (ys - 1) / 2)) * yl).toFixed(2);
            tabHK.rows[6].cells[2].innerHTML = ((dkj * 10000 * ys - dkj * 10000 / ys * (ys * (ys - 1) / 2)) * yl + dkj * 10000).toFixed(2);

            alert("计算完成!!!");
        }
    </script>

    <h1 class="text-center">贷款相关计算</h1>
    <p class="text-center">有错误或者新需求,请联系 peach5460#qq.com <a href="../index.html">返回主页</a></p>

    <div class="container">
        <div class="row clearfix">
            <div class="col-md-12 column">
                <form class="form-horizontal" role="form">
                    <div class="form-group">
                        <label for="DaiKuanJin" class="col-xs-2 control-label">贷款金额（万元）</label>
                        <div class="col-xs-10">
                            <input type="text" class="form-control" id="DaiKuanJin"
                                placeholder="贷款金额，首套房不高于评总的70%，二套房不高于50%" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="NianShu" class="col-xs-2 control-label">贷款期限（年）</label>
                        <div class="col-xs-10">
                            <input type="text" class="form-control" id="NianShu" value="30" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="NianLv" class="col-xs-2 control-label">年利率（%）</label>
                        <div class="col-xs-4">
                            <input type="text" class="form-control" id="NianLv" value="4.9" />
                        </div>

                        <label for="NianLv" class="col-xs-2 control-label">上浮（%）</label>
                        <div class="col-xs-4">
                            <input type="text" class="form-control" id="ShangFu" value="120" />
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="col-xs-offset-2 col-xs-10">
                            <button type="button" class="btn btn-default" onclick="OKclick()">
                                <span class="glyphicon glyphicon-ok" aria-hidden="true"></span>提交
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="row clearfix">
            <div class="col-md-12 column">
                <table class="table table-striped" id="HuanKuan">
                    <caption>还款细节</caption>
                    <thead>
                        <tr>
                            <td>项目</td>
                            <td>细节</td>
                            <td>金额（元）</td>
                        </tr>
                    </thead>

                    <tr class="danger">
                        <td>等额本息月供</td>
                        <td>按等额本息计算，每月还款金额</td>
                        <td>0</td>
                    </tr>

                    <tr>
                        <td>等额本息利息</td>
                        <td>按等额本息计算，还清后产生的利息总额</td>
                        <td>0</td>
                    </tr>

                    <tr>
                        <td>等额本息总额</td>
                        <td>按等额本息计算，还清后还款总额</td>
                        <td>0</td>
                    </tr>

                    <tr class="danger">
                        <td>等额本金月供</td>
                        <td>按等额本金计算，第一个月还款金额</td>
                        <td>0</td>
                    </tr>

                    <tr>
                        <td>等额本金利息</td>
                        <td>按等额本金计算，还清后产生的利息总额</td>
                        <td>0</td>
                    </tr>

                    <tr>
                        <td>等额本金总额</td>
                        <td>按等额本金计算，还清后还款总额</td>
                        <td>0</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
